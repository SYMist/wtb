name: Update ECOS data

on:
  schedule:
    # 매월 1일 03:00 UTC = 12:00 KST
    - cron: "0 3 1 * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: tooly/package-lock.json

      - name: Install dependencies
        working-directory: tooly
        run: npm ci

      - name: Fetch base rate time series
        working-directory: tooly
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: npx tsx scripts/fetch-base-rate-series.ts

      - name: Fetch interest rates snapshot
        working-directory: tooly
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: npx tsx scripts/fetch-interest-rates.ts

      - name: Fetch mortgage rate time series
        working-directory: tooly
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: npx tsx scripts/fetch-mortgage-rate-series.ts

      - name: Fetch USD/KRW exchange rate time series
        working-directory: tooly
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: npx tsx scripts/fetch-usdkrw-rate-series.ts

      - name: Fetch deposit rate time series
        working-directory: tooly
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: npx tsx scripts/fetch-deposit-rate-series.ts

      - name: Fetch JPY/KRW exchange rate time series
        working-directory: tooly
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: npx tsx scripts/fetch-jpykrw-rate-series.ts

      - name: Fetch CNY/KRW exchange rate time series
        working-directory: tooly
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: npx tsx scripts/fetch-cnykrw-rate-series.ts

      - name: Fetch EUR/KRW exchange rate time series
        working-directory: tooly
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: npx tsx scripts/fetch-eurkrw-rate-series.ts

      - name: Fetch Treasury 10Y rate time series
        working-directory: tooly
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: npx tsx scripts/fetch-treasury10y-rate-series.ts

      - name: Fetch exchange rates snapshot
        working-directory: tooly
        env:
          ECOS_API_KEY: ${{ secrets.ECOS_API_KEY }}
        run: npx tsx scripts/fetch-exchange-rates.ts

      - name: Commit & push data changes to main
        working-directory: tooly
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/data/*.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): monthly ECOS rates refresh"
            git push origin HEAD:main
          fi
