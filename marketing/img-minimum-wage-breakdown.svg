<svg width="800" height="460" viewBox="0 0 800 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="460" fill="#f0fdf4" rx="12"/>

  <!-- Title -->
  <text x="400" y="44" font-family="sans-serif" font-size="20" font-weight="bold" fill="#14532d" text-anchor="middle">2026년 최저임금 월급 → 실수령액 계산</text>
  <text x="400" y="66" font-family="sans-serif" font-size="13" fill="#4b7c5a" text-anchor="middle">주 40시간 기준 (209시간) · 부양가족 1인</text>

  <!-- Top amount box -->
  <rect x="220" y="84" width="360" height="64" fill="white" stroke="#86efac" stroke-width="2" rx="10"/>
  <text x="400" y="108" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">세전 월급</text>
  <text x="400" y="136" font-family="sans-serif" font-size="26" font-weight="bold" fill="#1e293b" text-anchor="middle">2,156,880원</text>

  <!-- Arrow down -->
  <line x1="400" y1="148" x2="400" y2="168" stroke="#86efac" stroke-width="2"/>
  <polygon points="400,176 393,162 407,162" fill="#86efac"/>

  <!-- Deduction items -->
  <!-- Background card -->
  <rect x="100" y="180" width="600" height="176" fill="white" stroke="#e2e8f0" stroke-width="1" rx="10"/>

  <text x="170" y="204" font-family="sans-serif" font-size="13" font-weight="bold" fill="#64748b" text-anchor="middle">공제 항목</text>
  <text x="490" y="204" font-family="sans-serif" font-size="13" font-weight="bold" fill="#64748b" text-anchor="middle">금액</text>
  <text x="650" y="204" font-family="sans-serif" font-size="13" font-weight="bold" fill="#64748b" text-anchor="middle">비율</text>
  <line x1="116" y1="212" x2="684" y2="212" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Row 1: 국민연금 -->
  <rect x="116" y="218" width="12" height="12" fill="#60a5fa" rx="2"/>
  <text x="135" y="229" font-family="sans-serif" font-size="13" fill="#334155">국민연금</text>
  <text x="490" y="229" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle">97,100원</text>
  <text x="650" y="229" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">4.5%</text>

  <!-- Row 2: 건강보험 -->
  <rect x="116" y="240" width="12" height="12" fill="#818cf8" rx="2"/>
  <text x="135" y="251" font-family="sans-serif" font-size="13" fill="#334155">건강보험</text>
  <text x="490" y="251" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle">76,500원</text>
  <text x="650" y="251" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">3.5%</text>

  <!-- Row 3: 장기요양 -->
  <rect x="116" y="262" width="12" height="12" fill="#a78bfa" rx="2"/>
  <text x="135" y="273" font-family="sans-serif" font-size="13" fill="#334155">장기요양보험</text>
  <text x="490" y="273" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle">9,900원</text>
  <text x="650" y="273" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">0.5%</text>

  <!-- Row 4: 고용보험 -->
  <rect x="116" y="284" width="12" height="12" fill="#67e8f9" rx="2"/>
  <text x="135" y="295" font-family="sans-serif" font-size="13" fill="#334155">고용보험</text>
  <text x="490" y="295" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle">19,400원</text>
  <text x="650" y="295" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">0.9%</text>

  <!-- Row 5: 소득세+지방 -->
  <rect x="116" y="306" width="12" height="12" fill="#fbbf24" rx="2"/>
  <text x="135" y="317" font-family="sans-serif" font-size="13" fill="#334155">소득세 + 지방소득세</text>
  <text x="490" y="317" font-family="sans-serif" font-size="13" fill="#334155" text-anchor="middle">31,680원</text>
  <text x="650" y="317" font-family="sans-serif" font-size="13" fill="#64748b" text-anchor="middle">1.5%</text>

  <!-- Total deduction -->
  <line x1="116" y1="328" x2="684" y2="328" stroke="#e2e8f0" stroke-width="1"/>
  <text x="135" y="346" font-family="sans-serif" font-size="13" font-weight="bold" fill="#dc2626">총 공제액</text>
  <text x="490" y="346" font-family="sans-serif" font-size="13" font-weight="bold" fill="#dc2626" text-anchor="middle">234,580원</text>
  <text x="650" y="346" font-family="sans-serif" font-size="13" fill="#dc2626" text-anchor="middle">10.9%</text>

  <!-- Arrow down -->
  <line x1="400" y1="356" x2="400" y2="376" stroke="#86efac" stroke-width="2"/>
  <polygon points="400,384 393,370 407,370" fill="#86efac"/>

  <!-- Result box -->
  <rect x="200" y="386" width="400" height="58" fill="#16a34a" rx="10"/>
  <text x="400" y="408" font-family="sans-serif" font-size="13" fill="#bbf7d0" text-anchor="middle">월 실수령액</text>
  <text x="400" y="433" font-family="sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle">1,922,300원</text>

  <!-- Source -->
  <text x="720" y="454" font-family="sans-serif" font-size="10" fill="#4b7c5a" text-anchor="end">tooly.deluxo.co.kr</text>
</svg>
